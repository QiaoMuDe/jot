# rnx 任务编排文件
# 项目地址: https://gitee.com/MM-Q/rnx.git
# 使用方法: rnx --run <任务名>

# 全局配置
[global]
# 工作目录
work_dir = '.'
# 超时时间
timeout = '120s'
# 是否显示输出
show_output = true
# 任务执行失败时是否退出程序
exit_on_error = true
# 是否显示执行的命令
show_cmd = false
# 命令黑名单
blacklist = []
# 并行执行的任务列表
parallel_tasks = []

# 全局变量
[global.vars]
app_name = 'jot'
exe_name = '{{app_name}}{{exe_suffix}}'
exe_path = '{{output_dir}}/{{exe_name}}'
exe_suffix = '@go env GOEXE'
git_version = '@git describe --tags --always --dirty'
ldflags = "-s -w -X 'gitee.com/MM-Q/verman.appName={{app_name}}' -X 'gitee.com/MM-Q/verman.gitVersion={{git_version}}'"
main_path = '.'
output_dir = './build/bin'
release_name = '{{app_name}}_windows_amd64_{{git_version}}.zip'

# 任务定义
[task]
[task.build]
# 任务描述
desc = '构建程序'
# 命令列表
cmds = [
    'cd frontend && npm install && npm run build',
    'wails build -ldflags "{{ldflags}}" -o {{exe_name}} -trimpath -upx -clean'
]
# 任务工作目录
work_dir = ''
# 依赖任务列表
depends_on = [
    'fc'
]
# 后继任务列表
run_after = []
# 支持运行的平台, 为空时表示支持所有平台(支持配置为: windows, linux, darwin)
platform = []
# 是否为内部任务 (true 时不显示在任务列表中)
internal = false

[task.fc]
# 任务描述
desc = '格式化代码并静态分析'
# 命令列表
cmds = [
    'golangci-lint fmt ./...',
    'golangci-lint run ./...'
]
# 任务工作目录
work_dir = ''
# 依赖任务列表
depends_on = []
# 后继任务列表
run_after = []
# 支持运行的平台, 为空时表示支持所有平台(支持配置为: windows, linux, darwin)
platform = []
# 是否为内部任务 (true 时不显示在任务列表中)
internal = false

[task.release]
# 任务描述
desc = '发布程序'
# 命令列表
cmds = [
    'cd frontend && npm install && npm run build',
    'wails build -ldflags "{{ldflags}}" -o {{exe_name}} -trimpath -upx -clean -nsis',
    'fck pack -o {{output_dir}}/{{release_name}} {{exe_path}}',
    'fck rm -f {{exe_path}}',
    'fck mv -f {{output_dir}}/jot-amd64-installer.exe {{output_dir}}/jot_windows_amd64_installer_{{git_version}}.exe'
]
# 任务工作目录
work_dir = ''
# 依赖任务列表
depends_on = [
    'fc'
]
# 后继任务列表
run_after = []
# 支持运行的平台, 为空时表示支持所有平台(支持配置为: windows, linux, darwin)
platform = []
# 是否为内部任务 (true 时不显示在任务列表中)
internal = false

[task.run]
# 任务描述
desc = '运行程序'
# 命令列表
cmds = [
    'cd frontend && npm install && npm run build',
    'wails build -debug -ldflags "{{ldflags}}" -o {{exe_name}} -clean',
    '{{exe_path}}'
]
# 任务工作目录
work_dir = ''
# 依赖任务列表
depends_on = [
    'fc'
]
# 后继任务列表
run_after = []
# 支持运行的平台, 为空时表示支持所有平台(支持配置为: windows, linux, darwin)
platform = []
# 是否为内部任务 (true 时不显示在任务列表中)
internal = false
