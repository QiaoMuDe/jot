<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>jot - 笔记</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
    <!-- 顶部导航栏 -->
    <header id="topbar">
        <div class="topbar-brand">
            <span class="brand-name">Jot</span>
        </div>
        <div class="topbar-search">
            <input type="text" id="searchInput" class="topbar-search-input" placeholder="搜索笔记..." />
        </div>
        <div class="topbar-actions">
            <button id="newNoteBtn" class="topbar-btn" title="新建笔记">+</button>
            <button id="batchModeBtn" class="topbar-btn" title="批量选择">✓</button>
            <div class="topbar-dropdown">
                <button id="moreMenuBtn" class="topbar-btn" title="更多">☰</button>
                <div id="moreMenu" class="dropdown-menu">
                    <div class="dropdown-item" data-action="home">全部笔记</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" data-action="data">数据管理</div>
                    <div class="dropdown-item" data-action="trash">回收站</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" data-action="settings">设置</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" data-action="help">帮助</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 批量操作栏 -->
    <div id="batchBar" class="batch-bar" style="display:none;">
        <div class="batch-bar-left">
            <span class="batch-bar-info">已选 <span id="batchCount">0</span> 条</span>
            <button class="batch-select-all-btn" id="batchSelectAllBtn">全选</button>
        </div>
        <div class="batch-bar-actions">
            <button class="btn btn-sm batch-btn btn-danger" id="batchDeleteBtn">批量删除</button>
            <button class="btn btn-sm batch-btn batch-cancel" id="batchCancelBtn">退出批量</button>
        </div>
    </div>

    <!-- 主内容区 -->
    <main id="mainContent">
        <!-- 视图 1: 卡片网格视图（默认） -->
        <div id="viewGrid" class="view active">
            <div class="card-grid" id="cardGrid">
                <!-- 卡片由 JS 动态渲染 -->
            </div>
        </div>

        <!-- 视图 2: 笔记编辑器（模态框） -->
        <div id="viewEditor" class="view">
            <div class="editor-overlay" id="editorOverlay">
                <div class="editor-panel" id="editorPanel">
                    <div class="editor-header">
                        <h3 id="editorTitle" style="display:none"></h3>
                        <div class="editor-header-actions">
                            <button class="editor-header-btn" id="editorFullscreenBtn" title="全屏编辑">⛶</button>
                            <button class="editor-header-btn" id="editorCloseBtn" title="关闭">✕</button>
                        </div>
                    </div>
                    <div class="editor-body">
                        <input type="text" id="editorNoteTitle" class="editor-input" placeholder="笔记标题" />
                        <div class="editor-section">
                            <div class="tag-selector" id="tagSelector">
                                <!-- 标签选项由 JS 动态渲染 -->
                            </div>
                        </div>
                        <textarea id="editorNoteContent" class="editor-textarea" placeholder="开始写点什么..." rows="12"></textarea>
                        <div id="mdRendered" class="md-rendered" style="display:none"></div>
                    </div>
                    <div class="editor-footer">
                        <span class="word-count" id="editorWordCount"></span>
                        <span class="auto-save-indicator" id="autoSaveIndicator"></span>
                        <span class="editor-edit-time" id="editorEditTime"></span>
                        <div class="editor-footer-btns">
                            <button class="btn btn-cancel" id="editorCancelBtn">取消</button>
                            <button class="btn btn-save" id="editorSaveBtn">保存</button>
                        </div>
                    </div>
                    <!-- 导入结果提示 -->
                    <div id="importResult" class="import-result" style="display: none;"></div>
                </div>
            </div>
        </div>

        <!-- 视图 3: 搜索列表页 -->
        <div id="viewSearch" class="view">
            <div class="view-header">
                <button class="back-btn" id="searchBackBtn">← 返回</button>
                <h2 class="view-title">搜索结果</h2>
                <div class="view-controls">
                    <span class="result-count" id="resultCount">找到 0 条结果</span>
                </div>
            </div>
            <div class="search-results" id="searchResults">
                <!-- 搜索结果由 JS 动态渲染 -->
            </div>
        </div>

        <!-- 视图 4: 设置页面 -->
        <div id="viewSettings" class="view">
            <div class="view-header">
                <button class="back-btn" id="settingsBackBtn">← 返回</button>
                <h2 class="view-title">设置</h2>
                <div class="view-controls"></div>
            </div>
            <div class="settings-content">
                <!-- 字体设置 -->
                <div class="settings-section">
                    <h3 class="settings-section-title">字体设置</h3>
                    <div class="font-settings">
                        <div class="font-setting-row">
                            <label class="font-setting-label">字体</label>
                            <div class="font-family-select" id="fontFamilySelect">
                                <div class="font-family-trigger" id="fontFamilyTrigger">
                                    <span id="fontFamilyDisplay">DM Sans</span>
                                    <span class="font-family-arrow">▼</span>
                                </div>
                                <div class="font-family-dropdown" id="fontFamilyDropdown">
                                    <input type="text" class="font-family-search" id="fontFamilySearch" placeholder="搜索字体..." />
                                </div>
                            </div>
                        </div>
                        <div class="font-setting-row">
                            <label class="font-setting-label">大小</label>
                            <div class="font-size-controls">
                                <div class="font-size-presets" id="fontSizePresets">
                                    <button class="font-size-btn" data-size="12">小</button>
                                    <button class="font-size-btn" data-size="14">偏小</button>
                                    <button class="font-size-btn active" data-size="16">默认</button>
                                    <button class="font-size-btn" data-size="18">大</button>
                                    <button class="font-size-btn" data-size="20">特大</button>
                                </div>
                                <div class="font-size-custom">
                                    <input type="number" id="fontSizeInput" class="font-size-input" min="10" max="32" placeholder="16" />
                                    <span class="font-size-unit">px</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 主题设置 -->
                <div class="settings-section">
                    <h3 class="settings-section-title">主题设置</h3>
                    <div class="font-settings">
                        <div class="font-setting-row">
                            <label class="font-setting-label">主题</label>
                            <div class="segmented-control theme-segmented" id="themeControl">
                                <div class="segmented-indicator" id="themeIndicator"></div>
                                <button class="segmented-btn active" data-theme-value="default">默认</button>
                                <button class="segmented-btn" data-theme-value="nord">北极</button>
                                <button class="segmented-btn" data-theme-value="monokai-pro">粉墨</button>
                                <button class="segmented-btn" data-theme-value="light">浅色</button>
                                <button class="segmented-btn" data-theme-value="tokyo-night">夜幕</button>
                                <button class="segmented-btn" data-theme-value="dark">深色</button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 快速笔记 -->
                <div class="settings-section">
                    <h3 class="settings-section-title">快速笔记</h3>
                    <div class="font-settings">
                        <div class="font-setting-row">
                            <label class="font-setting-label">启动快速笔记</label>
                            <div class="toggle-switch">
                                <input type="checkbox" id="quickNoteToggle">
                                <label class="toggle-track" for="quickNoteToggle">
                                    <span class="toggle-thumb"></span>
                                </label>
                            </div>
                        </div>
                        <div class="quick-note-hint">启用后，启动应用时自动打开全屏编辑器，方便快速记录</div>
                    </div>
                </div>
                <!-- 标签管理 -->
                <div class="settings-section">
                    <h3 class="settings-section-title">标签管理</h3>
                    <div class="tag-management" id="tagManagement">
                        <div class="tag-list" id="tagList">
                            <!-- 标签列表由 JS 动态渲染 -->
                        </div>
                        <div class="tag-add-form">
                            <input type="text" id="newTagName" class="settings-input" placeholder="新标签名称" />
                            <input type="color" id="newTagColor" class="settings-color-input" value="#6366f1" />
                            <button class="btn btn-save btn-sm" id="addTagBtn">添加</button>
                        </div>
                    </div>
                </div>
            <!-- 笔记排序 -->
            <div class="settings-section">
                <h3 class="settings-section-title">笔记排序</h3>
                <div class="page-size-control">
                    <div class="segmented-control sort-segmented" id="sortControl">
                        <div class="segmented-indicator" id="sortIndicator"></div>
                        <button class="segmented-btn active" data-sort-value="updated_at">更新时间</button>
                        <button class="segmented-btn" data-sort-value="created_at">创建时间</button>
                        <button class="segmented-btn" data-sort-value="title">名称</button>
                    </div>
                </div>
            </div>
            <!-- 分页大小 -->
            <div class="settings-section">
                <h3 class="settings-section-title">分页大小</h3>
                <div class="page-size-control">
                    <div class="segmented-control" id="pageSizeControl">
                        <div class="segmented-indicator" id="pageSizeIndicator"></div>
                        <button class="segmented-btn" data-value="20">20</button>
                        <button class="segmented-btn" data-value="40">40</button>
                        <button class="segmented-btn" data-value="60">60</button>
                        <button class="segmented-btn" data-value="80">80</button>
                        <button class="segmented-btn" data-value="100">100</button>
                    </div>
                    <span class="page-size-label" id="pageSizeLabel">20 条 / 页</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 视图 5: 数据管理页面 -->
        <div id="viewData" class="view">
            <div class="view-header">
                <button class="back-btn" id="dataBackBtn">← 返回</button>
                <h2 class="view-title">数据管理</h2>
                <div class="view-controls"></div>
            </div>
            <div class="data-content" id="dataContent">
                <div class="data-content-inner">
                <!-- 第一层：数据统计 -->
                <div class="data-section">
                    <div class="data-stats">
                        <div class="stat-card">
                            <div class="stat-body">
                                <div class="stat-value" id="statTotalNotes">0</div>
                                <div class="stat-label">笔记总数</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-body">
                                <div class="stat-value" id="statTotalTags">0</div>
                                <div class="stat-label">标签总数</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-body">
                                <div class="stat-value" id="statTrashedNotes">0</div>
                                <div class="stat-label">回收站</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-body">
                                <div class="stat-value" id="statDBSize">0</div>
                                <div class="stat-label">数据库大小</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 第二层：数据操作 -->
                <div class="data-section data-section-card">
                    <h3 class="data-section-title">数据操作</h3>
                    <div class="data-actions">
                        <div class="data-actions-row">
                            <button class="data-action-btn" id="exportDataBtn">
                                <span class="dab-icon">⬇️</span>
                                <span class="dab-text">导出数据</span>
                                <span class="dab-desc">将当前数据库完整备份为 .db 文件</span>
                            </button>
                            <button class="data-action-btn" id="importDataBtn">
                                <span class="dab-icon">⬆️</span>
                                <span class="dab-text">导入数据</span>
                                <span class="dab-desc">从 .db 文件还原数据库备份</span>
                            </button>
                        </div>
                        <button class="data-action-btn data-action-btn-danger" id="resetAllBtn">
                            <span class="dab-icon">⚠️</span>
                            <span class="dab-text">恢复出厂设置</span>
                            <span class="dab-desc">清空所有笔记、标签和设置</span>
                        </button>
                    </div>
                </div>

                <!-- 快速备份 -->
                <div class="data-section data-section-card backup-section">
                    <h3 class="data-section-title">快速备份</h3>
                    <div class="backup-info" id="backupInfo">暂无备份</div>
                    <div class="data-actions-row">
                        <button class="data-action-btn" id="backupBtn">
                            <span class="dab-icon">💾</span>
                            <span class="dab-text">一键备份</span>
                            <span class="dab-desc">覆盖上次备份</span>
                        </button>
                        <button class="data-action-btn" id="restoreBtn">
                            <span class="dab-icon">↩️</span>
                            <span class="dab-text">一键还原</span>
                            <span class="dab-desc">恢复至最新备份</span>
                        </button>
                    </div>
                </div>

                <!-- 第三层：数据目录 -->
                <div class="data-section data-section-card">
                    <h3 class="data-section-title">数据目录</h3>
                    <div class="data-actions single-action">
                        <button class="data-action-btn" id="openDataDirBtn">
                            <span class="dab-icon">📂</span>
                            <span class="dab-text">打开数据目录</span>
                            <span class="dab-desc">在文件管理器中查看数据库文件</span>
                        </button>
                    </div>
                </div>
                </div>
            </div>
        </div>
        
        <!-- 视图 6: 回收站页面 -->
        <div id="viewTrash" class="view">
            <div class="view-header">
                <button class="back-btn" id="trashBackBtn">← 返回</button>
                <h2 class="view-title">回收站</h2>
                <div class="view-controls">
                    <button class="btn btn-sm btn-restore" id="restoreAllBtn">全部恢复</button>
                    <button class="btn btn-sm btn-perm-delete" id="emptyTrashBtn">全部清空</button>
                </div>
            </div>
            <div class="trash-list" id="trashList">
                <div class="trash-list-inner" id="trashListInner">
                    <!-- 回收站笔记由 JS 动态渲染 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 浮动操作按钮 -->
    <div id="fabGroup" class="fab-group">
        <button id="backToTopBtn" class="fab fab-top" title="回到顶部">↑</button>
        <button id="fabNewNote" class="fab fab-add" title="新建笔记">+</button>
    </div>

    <!-- 撤销 Toast -->
        <div id="undoToast" class="undo-toast">
            <span class="undo-toast-msg" id="undoToastMsg"></span>
            <button class="undo-toast-btn" id="undoToastBtn">撤销</button>
        </div>

        <!-- 确认对话框 -->
        <div id="confirmDialog" class="confirm-dialog-overlay" style="display:none;">
            <div class="confirm-dialog">
                <div class="confirm-dialog-msg" id="confirmDialogMsg"></div>
                <div class="confirm-dialog-btns">
                    <button class="btn btn-cancel" id="confirmCancelBtn">取消</button>
                    <button class="btn btn-save" id="confirmOkBtn">确定</button>
                </div>
            </div>
        </div>

        <!-- 右键菜单 -->
        <div id="contextMenu" class="context-menu">
            <div class="context-menu-item" data-action="copy">复制</div>
            <div class="context-menu-divider"></div>
            <div class="context-menu-item" data-action="view">查看</div>
            <div class="context-menu-item" data-action="edit">编辑</div>
            <div class="context-menu-divider"></div>
            <div class="context-menu-item" data-action="pin">置顶</div>
            <div class="context-menu-divider"></div>
            <div class="context-menu-item danger" data-action="delete">删除</div>
        </div>

        <!-- 关于页面 -->
        <div id="viewAbout" class="about-overlay" style="display:none;">
            <div class="about-card">
                <button class="about-close-btn" id="aboutCloseBtn">✕</button>
                <div class="about-header">
                    <div class="about-logo">Jot</div>
                    <div class="about-subtitle">卡片式笔记应用</div>
                </div>
                <div class="about-body">
                    <p class="about-desc">简洁、高效的卡片式笔记工具，帮助您快速记录和管理灵感。</p>
                    <div class="about-info">
                        <div class="about-info-row">
                            <a class="about-link" id="aboutProjectLink" href="javascript:void(0)">https://gitee.com/MM-Q/jot.git</a>
                        </div>
                    </div>
                </div>
                <div class="about-footer">
                    <span class="about-version" id="aboutVersion">-</span>
                </div>
            </div>
        </div>

        <!-- 快捷键说明（模态框） -->
        <div id="shortcutsView" class="shortcuts-overlay" style="display:none;">
            <div class="shortcuts-card">
                <div class="shortcuts-header">
                    <h2>快捷键说明</h2>
                    <button class="shortcuts-close-btn" id="shortcutsCloseBtn">✕</button>
                </div>
                <div class="shortcuts-body" id="shortcutsBody">
                    <!-- 由 JS 渲染 -->
                </div>
            </div>
        </div>
</div>
<script src="./src/main.js" type="module"></script>
</body>
</html>
